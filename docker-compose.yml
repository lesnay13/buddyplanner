version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=buddy_user
      - POSTGRES_PASSWORD=buddy_password
      - POSTGRES_DB=buddy_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buddy_user -d buddy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: gunicorn buddy.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/home/app/web
      - static_volume:/home/app/web/staticfiles
      - media_volume:/home/app/web/media
    ports:
      - "8000:8000"
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=buddy_db
      - DB_USER=buddy_user
      - DB_PASSWORD=buddy_password
      - DB_HOST=db
      - DB_PORT=5432
      - DATABASE=postgres
      - SECRET_KEY=django-insecure-docker-dev-key-change-in-prod
      - DEBUG=1
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume: